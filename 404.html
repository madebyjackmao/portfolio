<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Jack Mao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
  <meta name="theme-color" content="#ccff00"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body {
      font-family: 'Syne', sans-serif;
      background: #0f0e1a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: none;
      overflow: hidden;
      padding: 2rem;
    
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    }
    .cursor {
      position: fixed;
      width: 14px; height: 14px;
      background: #ccff00;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width .2s, height .2s;
      mix-blend-mode: difference;
    }

    /* Background glow */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 50% 50% at 30% 60%, rgba(123,108,246,0.2) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 70% 40%, rgba(204,255,0,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .wrap {
      position: relative; z-index: 1;
      text-align: center;
      max-width: 560px;
    }

    /* Big 404 */
    .four-oh-four {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(6rem, 20vw, 12rem);
      line-height: 1;
      letter-spacing: -0.04em;
      color: rgba(255,255,255,0.06);
      margin-bottom: -1rem;
      user-select: none;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 1rem;
      background: rgba(204,255,0,0.06);
      border: 1px solid rgba(204,255,0,0.18);
      border-radius: 100px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ccff00;
      margin-bottom: 1.5rem;
    }

    .heading {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    .heading em {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      color: #a99cf8;
    }

    .sub {
      font-size: 0.95rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2.5rem;
      font-family: 'DM Mono', monospace;
    }

    .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: none;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: #ccff00;
      color: #0f0e1a;
      border: none;
      box-shadow: 0 6px 24px rgba(204,255,0,0.2);
    }
    .btn-primary:hover { box-shadow: 0 10px 32px rgba(204,255,0,0.3); }
    .btn-ghost {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-ghost:hover { color: #ffffff; border-color: rgba(255,255,255,0.2); }

    /* Decorative ✦ marks */
    .deco {
      position: fixed;
      font-size: 1rem;
      color: rgba(123,108,246,0.3);
      pointer-events: none;
      z-index: 0;
      animation: drift-deco 12s ease-in-out infinite;
    }
    .deco:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
    .deco:nth-child(2) { top: 70%; left: 8%;  animation-delay: -4s; font-size: 0.7rem; }
    .deco:nth-child(3) { top: 20%; right: 8%; animation-delay: -8s; }
    .deco:nth-child(4) { top: 75%; right: 12%;animation-delay: -2s; font-size: 0.7rem; }
    @keyframes drift-deco {
      0%,100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-12px) rotate(15deg); opacity: 0.6; }
    }

    @media (max-width: 480px) {
      .btn-row { flex-direction: column; align-items: center; }
      .btn { width: 100%; justify-content: center; }
    }

    :focus-visible { outline: 2px solid #ccff00; outline-offset: 3px; border-radius: 4px; }
    a:focus-visible { outline: 2px solid #ccff00; outline-offset: 4px; border-radius: 6px; }
    :focus:not(:focus-visible) { outline: none; }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="bg-glow"></div>

  <span class="deco">✦</span>
  <span class="deco">✦</span>
  <span class="deco">✦</span>
  <span class="deco">✦</span>

  <div class="wrap">
    <div class="four-oh-four">404</div>
    <div class="tag">✦ &nbsp; Page not found</div>
    <h1 class="heading">Nothing here.<br><em>Yet.</em></h1>
    <p class="sub">The page you're looking for doesn't exist —<br/>or hasn't been designed yet.</p>
    <div class="btn-row">
      <a class="btn btn-primary" href="index.html">← Back to portfolio</a>
      <a class="btn btn-ghost" href="index.html#work">View work →</a>
    </div>
  </div>

  <script>
    const cur = document.getElementById('cursor');
    cur.style.left = '-100px'; cur.style.top = '-100px';
    document.addEventListener('mousemove', e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a').forEach(el => {
      el.addEventListener('mouseenter', () => cur.style.width = cur.style.height = '36px');
      el.addEventListener('mouseleave', () => cur.style.width = cur.style.height = '14px');
    });
  </script>
</body>
</html>
